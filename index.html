<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/
    aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

  <a-scene embedded arjs>

    <!-- This is the AR marker (Hiro pattern) -->
    <a-marker preset="hiro">

      <!-- Replace this box with your 3D model -->
      <a-box position="0 0.5 0"
             material="color: red;"
             scale="1 1 1">
      </a-box>

      <!-- Or load a .glTF model like this: -->
      <!-- <a-entity gltf-model="url(C:\Users\ahmed\OneDrive\Desktop\panda .glb)"
                   position="0 0 0"
                   scale="0.5 0.5 0.5"></a-entity> -->

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
